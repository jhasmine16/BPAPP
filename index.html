<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabetes Checker</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px gray;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

#resultBox{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
    display:none;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<h2>Diabetes Checker</h2>

<input type="text" id="patientName" placeholder="Enter Patient Name">
<input type="text" id="doctorName" placeholder="Enter Doctor Name">
<input type="number" id="sugarLevel" placeholder="Enter Sugar Level">

<button id="checkBtn" onclick="checkResult()">Check Result</button>

<div id="resultBox"></div>
</div>

<script>

function checkResult(){

let patient = document.getElementById("patientName").value;
let doctor = document.getElementById("doctorName").value;
let sugar = document.getElementById("sugarLevel").value;

let box = document.getElementById("resultBox");
let btn = document.getElementById("checkBtn");

box.style.display="block";

if(sugar > 5){

    box.style.background="red";
    btn.style.background="red";

    box.innerHTML =
    "Patient: " + patient + "<br>" +
    "Doctor: " + doctor + "<br>" +
    "Result: Diabetic";

}else{

    box.style.background="green";
    btn.style.background="green";

    box.innerHTML =
    "Patient: " + patient + "<br>" +
    "Doctor: " + doctor + "<br>" +
    "Result: Non-Diabetic";
}

}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
