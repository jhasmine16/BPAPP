<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yash Cafe</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { background:#c9b79c; padding-bottom:70px; }

.header {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    padding:20px;
}

.header-img img {
    width:80px;
    height:auto;
}

.welcome-text {
    font-style:italic;
    font-family:cursive;
}

.cafe-name {
    font-size:30px;
    font-weight:bold;
}

.menu-category {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
}

.category-btn {
    width:65%;
    padding:15px;
    border-radius:30px;
    border:2px solid black;
    background:white;
    font-weight:bold;
    cursor:pointer;
}

/* ALL IMAGES SAME BIG SIZE */
.category-img {
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:50%;
    border:2px solid black;
}

.menu-table {
    display:grid;
    grid-template-columns: 1fr 60px 60px 60px;
    padding:10px 20px;
    align-items:center;
    font-size:16px;
}

.menu-table span:first-child {
    text-align:left;
}

.menu-table span {
    text-align:center;
}

.header-row {
    font-weight:bold;
    border-bottom:2px solid black;
    margin-bottom:5px;
    padding-bottom:5px;
}

#coffee-menu, #snacks-menu, #milktea-menu {
    display:none;
    background:white;
    margin:10px;
    border-radius:10px;
    padding:10px;
}

.bottom-nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#6b8e23;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-img">
        <img src="coffee-header.png" alt="Coffee Logo">
    </div>
    <div>
        <div class="welcome-text">Welcome to</div>
        <div class="cafe-name">YASH CAFE</div>
    </div>
</div>

<!-- Coffee -->
<div class="menu-category">
    <button class="category-btn" onclick="toggleMenu('coffee-menu')">Coffee Blends</button>
    <img src="coffee-blend.png" class="category-img">
</div>

<div id="coffee-menu">
    <h3>COFFEE BLENDS</h3>
    <div class="menu-table header-row">
        <span></span><span>REG</span><span>MED</span><span>LRG</span>
    </div>
    <div class="menu-table"><span>Classic Coffee</span><span>90</span><span>100</span><span>110</span></div>
    <div class="menu-table"><span>Latte</span><span>80</span><span>90</span><span>100</span></div>
    <div class="menu-table"><span>Americano</span><span>85</span><span>95</span><span>105</span></div>
    <div class="menu-table"><span>Cappuccino</span><span>85</span><span>95</span><span>105</span></div>
</div>

<!-- Snacks -->
<div class="menu-category">
    <button class="category-btn" onclick="toggleMenu('snacks-menu')">Snacks</button>
    <img src="snacks.png" class="category-img">
</div>

<div id="snacks-menu">
    <h3>SNACKS</h3>
    <div class="menu-table header-row">
        <span></span><span>S</span><span>M</span>
    </div>
    <div class="menu-table"><span>Croissant</span><span>59</span><span>89</span></div>
    <div class="menu-table"><span>Muffin</span><span>50</span><span>75</span></div>
    <div class="menu-table"><span>Sandwich</span><span>39</span><span>59</span></div>
</div>

<!-- Milk Tea -->
<div class="menu-category">
    <button class="category-btn" onclick="toggleMenu('milktea-menu')">MilkTeas</button>
    <img src="milktea.png" class="category-img">
</div>

<div id="milktea-menu">
    <h3>MILK TEA</h3>
    <div class="menu-table header-row">
        <span></span><span>16oz</span><span>22oz</span>
    </div>
    <div class="menu-table"><span>Cookies & Cream</span><span>39</span><span>59</span></div>
    <div class="menu-table"><span>Matcha Latte</span><span>45</span><span>65</span></div>
    <div class="menu-table"><span>Choco Kisses</span><span>40</span><span>60</span></div>

    <h3 style="margin-top:15px;">FRAPPE</h3>
    <div class="menu-table header-row">
        <span></span><span>16oz</span><span>22oz</span>
    </div>
    <div class="menu-table"><span>Matcha Latte</span><span>89</span><span>109</span></div>
    <div class="menu-table"><span>Taro</span><span>79</span><span>99</span></div>
    <div class="menu-table"><span>Caramel</span><span>69</span><span>89</span></div>
</div>

<script>
function toggleMenu(id) {
    const menus = ["coffee-menu", "snacks-menu", "milktea-menu"];

    menus.forEach(menu => {
        document.getElementById(menu).style.display = "none";
    });

    const selected = document.getElementById(id);
    selected.style.display = (selected.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
